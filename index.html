<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Daikin">
  <meta name="theme-color" content="#070b14">
  <link rel="manifest" href="manifest.json">
  <title>Daikin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #070b14;
      --surface:   #0d1220;
      --card:      #111827;
      --card2:     #161f30;
      --border:    rgba(255,255,255,0.06);
      --border2:   rgba(255,255,255,0.10);
      --text:      #f0f4ff;
      --muted:     #4b5675;
      --muted2:    #6b7a99;
      --radius:    18px;
      --radius-sm: 12px;

      /* Mode colors */
      --cool:      #00d4ff;
      --cool-dim:  rgba(0,212,255,0.12);
      --heat:      #ff7043;
      --heat-dim:  rgba(255,112,67,0.12);
      --dry:       #b39ddb;
      --dry-dim:   rgba(179,157,219,0.12);
      --fan:       #26d07c;
      --fan-dim:   rgba(38,208,124,0.12);
      --auto:      #90a4c8;
      --auto-dim:  rgba(144,164,200,0.10);

      --accent:     var(--cool);
      --accent-dim: var(--cool-dim);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* Ambient glow */
    .glow {
      position: fixed;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, var(--accent-dim) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
      transition: background 0.7s ease;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 420px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── Header ── */
    .header {
      padding: 52px 20px 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .header-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 3px;
    }
    .header-name {
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 100px;
      padding: 7px 13px 7px 10px;
      font-size: 11.5px;
      font-weight: 500;
      color: var(--muted2);
      transition: all 0.3s;
      white-space: nowrap;
    }
    .status-pill.on { color: var(--fan); border-color: rgba(38,208,124,0.25); }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .status-pill.on .status-dot {
      background: var(--fan);
      box-shadow: 0 0 6px var(--fan);
      animation: blink 2.2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }

    /* ── Room temp strip ── */
    .room-strip {
      margin: 16px 20px 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .room-strip-label { font-size: 12.5px; color: var(--muted2); }
    .room-strip-val {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
      transition: color 0.4s;
    }

    /* ── Mode pills ── */
    .modes {
      display: flex;
      gap: 8px;
      padding: 16px 20px 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .modes::-webkit-scrollbar { display: none; }
    .mode-pill {
      flex: 0 0 auto;
      padding: 8px 16px;
      border-radius: 100px;
      border: 1.5px solid var(--border2);
      background: var(--card);
      color: var(--muted2);
      font-size: 12.5px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.22s;
      letter-spacing: 0.01em;
    }
    .mode-pill:active { transform: scale(0.93); }
    .mode-pill[data-mode="cool"].active  { background: var(--cool-dim); border-color: var(--cool);  color: var(--cool); }
    .mode-pill[data-mode="heat"].active  { background: var(--heat-dim); border-color: var(--heat);  color: var(--heat); }
    .mode-pill[data-mode="fan"].active   { background: var(--fan-dim);  border-color: var(--fan);   color: var(--fan); }
    .mode-pill[data-mode="dry"].active   { background: var(--dry-dim);  border-color: var(--dry);   color: var(--dry); }
    .mode-pill[data-mode="auto"].active  { background: var(--auto-dim); border-color: var(--auto);  color: var(--auto); }

    /* ── Dial ── */
    .dial-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 20px 0;
    }
    .dial-ring {
      position: relative;
      width: 240px;
      height: 240px;
    }
    .dial-ring svg { width: 100%; height: 100%; }
    .dial-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .dial-sub {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 2px;
    }
    .dial-temp {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 72px;
      font-weight: 700;
      line-height: 1;
      color: var(--accent);
      transition: color 0.4s;
      letter-spacing: -0.03em;
    }
    .dial-deg { font-size: 26px; vertical-align: super; font-weight: 500; }
    .dial-mode-label {
      font-size: 12px;
      color: var(--muted2);
      margin-top: 4px;
      font-weight: 500;
    }

    /* temp +/- */
    .temp-btns {
      display: flex;
      gap: 20px;
      margin-top: 18px;
    }
    .temp-btn {
      width: 58px; height: 58px;
      border-radius: 50%;
      background: var(--card2);
      border: 1.5px solid var(--border2);
      color: var(--text);
      font-size: 26px;
      font-weight: 300;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.18s;
      user-select: none;
    }
    .temp-btn:active { transform: scale(0.86); background: var(--accent-dim); border-color: var(--accent); }

    /* ── Fan speed ── */
    .section {
      padding: 16px 20px 0;
    }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .fan-row {
      display: flex;
      gap: 7px;
    }
    .fan-btn {
      flex: 1;
      padding: 10px 4px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--muted2);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.04em;
      transition: all 0.18s;
    }
    .fan-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }
    .fan-btn:active { transform: scale(0.92); }

    /* ── Zones ── */
    .zones-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .zone-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: all 0.22s;
    }
    .zone-card.active {
      background: var(--accent-dim);
      border-color: var(--accent);
    }
    .zone-card:active { transform: scale(0.96); }
    .zone-name {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--muted2);
      line-height: 1.3;
      max-width: 90px;
    }
    .zone-card.active .zone-name { color: var(--accent); }
    .zone-toggle {
      width: 36px; height: 20px;
      border-radius: 100px;
      background: var(--card2);
      border: 1.5px solid var(--border2);
      position: relative;
      flex-shrink: 0;
      transition: all 0.25s;
    }
    .zone-toggle::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--muted);
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .zone-card.active .zone-toggle {
      background: var(--accent);
      border-color: var(--accent);
    }
    .zone-card.active .zone-toggle::after {
      transform: translateX(16px);
      background: #fff;
    }

    /* ── Bottom actions ── */
    .actions {
      padding: 16px 20px 32px;
      display: flex;
      gap: 10px;
    }
    .power-btn {
      flex: 1;
      padding: 16px;
      border-radius: var(--radius);
      border: 1.5px solid rgba(239,68,68,0.3);
      background: rgba(239,68,68,0.1);
      color: #f87171;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.22s;
      font-family: 'Inter', sans-serif;
    }
    .power-btn.off {
      border-color: rgba(38,208,124,0.3);
      background: rgba(38,208,124,0.1);
      color: var(--fan);
    }
    .power-btn:active { transform: scale(0.96); }
    .power-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; }
    .action-btn {
      width: 52px; height: 52px;
      background: var(--card);
      border: 1.5px solid var(--border2);
      border-radius: var(--radius-sm);
      color: var(--muted2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.18s;
    }
    .action-btn:active { transform: scale(0.92); background: var(--card2); }
    .action-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 1.8; }

    /* ── Last update ── */
    .last-update {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      padding: 6px 0 2px;
      font-family: 'Space Grotesk', sans-serif;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--card2);
      border: 1px solid var(--border2);
      border-radius: 100px;
      padding: 9px 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      opacity: 0;
      transition: all 0.28s ease;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
      backdrop-filter: blur(20px);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Loading overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(7,11,20,0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 200;
      backdrop-filter: blur(16px);
      transition: opacity 0.4s;
    }
    .overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .overlay p { font-size: 13px; color: var(--muted2); }

    /* ── Settings modal ── */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(7,11,20,0.7);
      z-index: 300;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      backdrop-filter: blur(10px);
    }
    .modal-bg.open { opacity: 1; pointer-events: all; }
    .modal {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: 28px 28px 0 0;
      border-top: 1px solid var(--border2);
      padding: 24px 20px calc(40px + env(safe-area-inset-bottom));
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    .modal-bg.open .modal { transform: translateY(0); }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .modal-header h2 { font-size: 16px; font-weight: 600; }
    .modal-close {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--card2);
      border: none;
      color: var(--muted2);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; color: var(--muted2); margin-bottom: 6px; font-weight: 500; }
    .field input {
      width: 100%;
      background: var(--card);
      border: 1.5px solid var(--border2);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      color: var(--text);
      font-family: 'Space Grotesk', monospace;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--accent); }
    .save-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: #000;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.2s;
      margin-top: 4px;
    }
    .save-btn:active { opacity: 0.8; }
  </style>
</head>
<body>

<div class="glow" id="glow"></div>

<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <p>Connecting…</p>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-header">
      <h2>Settings</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="field">
      <label>Unit IP / Host</label>
      <input type="text" id="ip-input" placeholder="192.168.0.3" inputmode="url">
    </div>
    <button class="save-btn" onclick="saveSettings()">Save & Reconnect</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div>
      <div class="header-title">Daikin Controller</div>
      <div class="header-name" id="unit-name">Loading…</div>
    </div>
    <div class="status-pill" id="status-pill">
      <div class="status-dot"></div>
      <span id="status-text">Connecting</span>
    </div>
  </div>

  <!-- Room temp -->
  <div class="room-strip">
    <span class="room-strip-label">Room temperature</span>
    <span class="room-strip-val"><span id="room-temp">—</span> °C</span>
  </div>

  <!-- Mode selector -->
  <div class="modes" id="modes">
    <button class="mode-pill active" data-mode="cool" onclick="setMode('cool')">❄ Cool</button>
    <button class="mode-pill" data-mode="heat" onclick="setMode('heat')">🔥 Heat</button>
    <button class="mode-pill" data-mode="fan"  onclick="setMode('fan')">💨 Fan</button>
    <button class="mode-pill" data-mode="dry"  onclick="setMode('dry')">💧 Dry</button>
    <button class="mode-pill" data-mode="auto" onclick="setMode('auto')">⚡ Auto</button>
  </div>

  <!-- Dial -->
  <div class="dial-wrap">
    <div class="dial-ring">
      <svg viewBox="0 0 240 240">
        <!-- Track -->
        <circle cx="120" cy="120" r="100" fill="none"
          stroke="rgba(255,255,255,0.05)" stroke-width="20"
          stroke-dasharray="534" stroke-dashoffset="134"
          transform="rotate(126 120 120)"/>
        <!-- Progress -->
        <circle id="dial-arc" cx="120" cy="120" r="100" fill="none"
          stroke="var(--accent)" stroke-width="20" stroke-linecap="round"
          stroke-dasharray="534" stroke-dashoffset="467"
          transform="rotate(126 120 120)"
          style="transition: stroke-dashoffset 0.4s ease, stroke 0.4s ease;
                 filter: drop-shadow(0 0 10px var(--accent));"/>
      </svg>
      <div class="dial-center">
        <div class="dial-sub" id="dial-sub">Cooling to</div>
        <div class="dial-temp" id="dial-temp">24<span class="dial-deg">°</span></div>
        <div class="dial-mode-label" id="dial-mode-label">Cool mode</div>
      </div>
    </div>
    <div class="temp-btns">
      <button class="temp-btn" onclick="adjustTemp(-1)">−</button>
      <button class="temp-btn" onclick="adjustTemp(1)">+</button>
    </div>
  </div>

  <!-- Last update -->
  <div class="last-update" id="last-update">—</div>

  <!-- Fan speed -->
  <div class="section">
    <div class="section-label">Fan Speed</div>
    <div class="fan-row" id="fan-row">
      <button class="fan-btn active" data-fan="A" onclick="setFan('A')">AUTO</button>
      <button class="fan-btn" data-fan="1" onclick="setFan('1')">LOW</button>
      <button class="fan-btn" data-fan="2" onclick="setFan('2')">MED</button>
      <button class="fan-btn" data-fan="3" onclick="setFan('3')">HIGH</button>
    </div>
  </div>

  <!-- Zones -->
  <div class="section" id="zones-section">
    <div class="section-label">Zones</div>
    <div class="zones-grid" id="zones-grid">
      <!-- populated by JS -->
    </div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="power-btn" id="power-btn" onclick="togglePower()">
      <svg viewBox="0 0 24 24"><path d="M18.36 6.64a9 9 0 1 1-12.73 0M12 2v10"/></svg>
      <span id="power-label">Turn Off</span>
    </button>
    <button class="action-btn" onclick="fetchAll()" title="Refresh">
      <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M21 7l-2.26 2.26A9.75 9.75 0 0 0 12 7a9 9 0 0 0-9 9"/></svg>
    </button>
    <button class="action-btn" onclick="openModal()" title="Settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>

</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const S = {
  ip:       localStorage.getItem('daikin_ip') || window.location.host,
  power:    true,
  mode:     'cool',
  temp:     24,
  fan:      'A',
  roomTemp: null,
  connected: false,
  zones:    [],   // [{name, on}]
  rawZoneNames: '',
};

const MODES = {
  auto: { code:'1', label:'Set to',     sub:'Auto mode',   accent:'--auto',  dim:'--auto-dim' },
  dry:  { code:'2', label:'Drying',     sub:'Dry mode',    accent:'--dry',   dim:'--dry-dim'  },
  cool: { code:'3', label:'Cooling to', sub:'Cool mode',   accent:'--cool',  dim:'--cool-dim' },
  heat: { code:'4', label:'Heating to', sub:'Heat mode',   accent:'--heat',  dim:'--heat-dim' },
  fan:  { code:'6', label:'Fan only',   sub:'Fan mode',    accent:'--fan',   dim:'--fan-dim'  },
};
const CODE_TO_MODE = Object.fromEntries(Object.entries(MODES).map(([k,v])=>[v.code,k]));

// ── API ────────────────────────────────────────────────────────────────────
function base() { return `http://${S.ip}`; }

async function dGet(path) {
  const r = await fetch(`${base()}${path}`, { cache:'no-store' });
  const t = await r.text();
  return Object.fromEntries(t.split(',').map(p => { const [k,...v]=p.split('='); return [k?.trim(), v.join('=').trim()]; }));
}

async function dSet(path, params) {
  const qs = new URLSearchParams(params).toString();
  const r = await fetch(`${base()}${path}?${qs}`, { cache:'no-store' });
  return (await r.text()).includes('ret=OK');
}

// ── Fetch ──────────────────────────────────────────────────────────────────
async function fetchAll() {
  try {
    const [ctrl, sensor, zone] = await Promise.all([
      dGet('/aircon/get_control_info'),
      dGet('/aircon/get_sensor_info'),
      dGet('/aircon/get_zone_setting'),
    ]);

    if (ctrl.ret !== 'OK') throw new Error('bad response');

    S.power    = ctrl.pow === '1';
    S.mode     = CODE_TO_MODE[ctrl.mode] || 'cool';
    S.temp     = parseFloat(ctrl.stemp) || S.temp;
    S.fan      = ctrl.f_rate || 'A';
    S.roomTemp = (sensor.htemp && sensor.htemp !== '-') ? parseFloat(sensor.htemp) : null;

    // Parse zones
    if (zone.ret === 'OK') {
      S.rawZoneNames = zone.zone_name || '';
      const names  = decodeURIComponent(S.rawZoneNames).split(';').map(n=>n.trim());
      const states = decodeURIComponent(zone.zone_onoff || '').split(';');
      S.zones = names.map((name, i) => ({ name, on: states[i] === '1' }));
    }

    S.connected = true;
    renderAll();
    stamp();
  } catch(e) {
    S.connected = false;
    renderStatus();
    toast('⚠ Could not reach unit');
  } finally {
    document.getElementById('overlay').classList.add('hidden');
  }
}

// ── Send control ───────────────────────────────────────────────────────────
async function sendControl() {
  const m = MODES[S.mode];
  await dSet('/aircon/set_control_info', {
    pow:    S.power ? '1' : '0',
    mode:   m.code,
    stemp:  S.mode === 'fan' ? '--' : S.temp,
    shum:   0,
    f_rate: S.fan,
    f_dir:  0,
    f_airside: 0,
    airside1: 0,
    airside2: 0,
  });
}

async function sendZones() {
  const onoff = S.zones.map(z => z.on ? '1' : '0').join(';');
  await dSet('/aircon/set_zone_setting', {
    zone_name:  S.rawZoneNames,
    zone_onoff: encodeURIComponent(onoff),
  });
}

// ── Actions ────────────────────────────────────────────────────────────────
function setMode(m) {
  S.mode = m;
  renderMode(); renderTemp();
  sendControl().then(() => toast('Mode updated'));
}

function adjustTemp(d) {
  if (S.mode === 'fan') return;
  S.temp = Math.min(32, Math.max(16, (parseFloat(S.temp)||24) + d));
  renderTemp();
  sendControl().then(() => toast(`Set to ${S.temp}°C`));
}

function setFan(f) {
  S.fan = f;
  renderFan();
  sendControl().then(() => toast('Fan speed updated'));
}

function togglePower() {
  S.power = !S.power;
  renderPower();
  sendControl().then(() => toast(S.power ? '✓ Turned on' : '✓ Turned off'));
}

function toggleZone(i) {
  S.zones[i].on = !S.zones[i].on;
  renderZones();
  sendZones().then(() => toast(`${S.zones[i].name}: ${S.zones[i].on?'On':'Off'}`));
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderAll() {
  renderStatus(); renderMode(); renderTemp(); renderFan(); renderPower(); renderRoomTemp(); renderZones();
}

function renderStatus() {
  const pill = document.getElementById('status-pill');
  const txt  = document.getElementById('status-text');
  if (S.connected) {
    pill.className = 'status-pill on';
    txt.textContent = 'Connected';
    document.getElementById('unit-name').textContent = 'Daikin Controller';
  } else {
    pill.className = 'status-pill';
    txt.textContent = 'Offline';
  }
}

function renderMode() {
  const cfg = MODES[S.mode];
  // accent
  document.documentElement.style.setProperty('--accent',     `var(${cfg.accent})`);
  document.documentElement.style.setProperty('--accent-dim', `var(${cfg.dim})`);
  // pills
  document.querySelectorAll('.mode-pill').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === S.mode));
  // dial labels
  document.getElementById('dial-sub').textContent = cfg.label;
  document.getElementById('dial-mode-label').textContent = cfg.sub;
}

function renderTemp() {
  const t = S.mode === 'fan' ? '—' : S.temp;
  document.getElementById('dial-temp').innerHTML = `${t}<span class="dial-deg">°</span>`;
  // arc: 16→32 mapped over 270° arc, full arc circumference = 2π×100 ≈ 628, 75% = 471
  const ARC = 400; // usable arc length
  const pct = typeof S.temp === 'number' && S.mode !== 'fan'
    ? (S.temp - 16) / (32 - 16) : 0.5;
  const offset = 534 - ARC * pct;
  document.getElementById('dial-arc').style.strokeDashoffset = offset;
}

function renderFan() {
  document.querySelectorAll('.fan-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.fan === S.fan));
}

function renderPower() {
  const btn   = document.getElementById('power-btn');
  const label = document.getElementById('power-label');
  if (S.power) {
    btn.className = 'power-btn';
    label.textContent = 'Turn Off';
  } else {
    btn.className = 'power-btn off';
    label.textContent = 'Turn On';
  }
}

function renderRoomTemp() {
  document.getElementById('room-temp').textContent =
    S.roomTemp !== null ? S.roomTemp : '—';
}

function renderZones() {
  const grid = document.getElementById('zones-grid');
  // Only show zones with real names (not generic Zone3-Zone8)
  const visible = S.zones.filter(z => !/^Zone\d+$/.test(z.name));
  if (!visible.length) {
    document.getElementById('zones-section').style.display = 'none';
    return;
  }
  document.getElementById('zones-section').style.display = '';
  grid.innerHTML = visible.map((z, i) => {
    const realIdx = S.zones.indexOf(z);
    return `<div class="zone-card${z.on?' active':''}" onclick="toggleZone(${realIdx})">
      <div class="zone-name">${z.name}</div>
      <div class="zone-toggle"></div>
    </div>`;
  }).join('');
}

function stamp() {
  const el = document.getElementById('last-update');
  el.textContent = `Updated ${new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'})}`;
}

// ── Toast ──────────────────────────────────────────────────────────────────
let _toastT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastT);
  _toastT = setTimeout(() => el.classList.remove('show'), 2400);
}

// ── Modal ──────────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('ip-input').value = S.ip;
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }
function saveSettings() {
  const v = document.getElementById('ip-input').value.trim();
  if (!v) return;
  S.ip = v;
  localStorage.setItem('daikin_ip', v);
  closeModal();
  document.getElementById('overlay').classList.remove('hidden');
  fetchAll();
}
document.getElementById('modal-bg').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-bg')) closeModal();
});

// ── Init ───────────────────────────────────────────────────────────────────
fetchAll();
setInterval(fetchAll, 30000);
</script>
</body>
</html>
